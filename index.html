<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Tugas Program Dart - Fibonacci</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #1d2671, #c33764);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 20px;
      max-width: 800px;
      width: 100%;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: fadeIn 1s ease;
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    .desc {
      margin: 15px 0;
      text-align: center;
      line-height: 1.6;
      font-size: 16px;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 12px 20px;
      border: none;
      border-radius: 30px;
      background: #00e5ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00bcd4;
      transform: scale(1.05);
    }

    .output-img {
      width: 100%;
      border-radius: 12px;
      margin-top: 15px;
      border: 2px solid rgba(255,255,255,0.3);
    }

    /* MODAL */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal-content {
      background: white;
      width: 95%;
      max-width: 1000px;
      height: 90%;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      animation: zoomIn 0.3s ease;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 18px;
      font-size: 28px;
      cursor: pointer;
      color: #333;
      font-weight: bold;
      z-index: 10;
      background: rgba(255,255,255,0.8);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: 0.2s;
    }

    .close:hover {
      background: red;
      color: white;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(20px);}
      to {opacity:1; transform: translateY(0);}
    }

    @keyframes zoomIn {
      from {transform: scale(0.8); opacity: 0;}
      to {transform: scale(1); opacity: 1;}
    }
  </style>
</head>
<body>

<div class="card">
  <h2>📊 Program Fibonacci (Dart)</h2>
  <div class="desc">
    Program ini menghitung bilangan Fibonacci menggunakan metode rekursif 
    dengan input n = 20. Output ditampilkan melalui DartPad.
  </div>

  <button class="btn" onclick="openModal()">📄 Lihat Source Code & Run</button>

  <!-- Gambar output (pastikan file output.jpg.jpeg tersedia) -->
  <img src="output.jpg.jpeg" alt="Output Program Fibonacci" class="output-img" 
       onerror="this.onerror=null; this.src='https://placehold.co/800x200/1e293b/white?text=Gambar+output.jpg.jpeg+tidak+ditemukan'; this.style.objectFit='cover';">
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <!-- Perbaikan: gunakan embed-dart.html dengan parameter id gist yang benar -->
    <iframe src="https://dartpad.dev/embed-dart.html?id=92ba8fd7249abb934d2a42af195b1c1a&run=true"></iframe>
  </div>
</div>

<script>
  function openModal() {
    document.getElementById("modal").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("modal").style.display = "none";
  }

  // Tutup modal jika klik di luar konten
  window.onclick = function(event) {
    let modal = document.getElementById("modal");
    if (event.target === modal) {
      modal.style.display = "none";
    }
  }
</script>

</body>
</html>
